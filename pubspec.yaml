name: dirghayufoods
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5
  provider: ^6.0.5
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  pdf: ^3.10.0
  printing: ^5.12.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/dirghayulogo.png
    - assets/babyfood.png
    - assets/familywellness.png
    - assets/healthsupplements.png
    - assets/maternalcare.png
    - assets/naturalsweetener.png
    - assets/oilandvinegar.png
    - assets/NotoSansDevanagari-Regular.ttf
    - assets/dirghayu_devanagari.png
    - assets/bestseller.png
    - assets/dirghayulogo1.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/dirghayulogo.png"
  min_sdk_android: 21